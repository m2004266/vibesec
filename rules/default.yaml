rules:
# VIBESEC_DISABLED   - id: vibesec.cors-wildcard-origin-express
# VIBESEC_DISABLED     message: 'A wildcard CORS origin ("*") lets any website read responses from this endpoint. If the endpoint serves authenticated data, list trusted origins explicitly and validate incoming Origin against
# VIBESEC_DISABLED       that allowlist.
# VIBESEC_DISABLED 
# VIBESEC_DISABLED       '
# VIBESEC_DISABLED     severity: WARNING
# VIBESEC_DISABLED     languages:
# VIBESEC_DISABLED       - javascript
# VIBESEC_DISABLED       - typescript
# VIBESEC_DISABLED     patterns:
# VIBESEC_DISABLED       - pattern-either:
# VIBESEC_DISABLED           - pattern: '$RES.setHeader("Access-Control-Allow-Origin", "*")
# VIBESEC_DISABLED 
# VIBESEC_DISABLED               '
# VIBESEC_DISABLED           - pattern: '$RES.header("Access-Control-Allow-Origin", "*")
# VIBESEC_DISABLED 
# VIBESEC_DISABLED               '
# VIBESEC_DISABLED     metadata:
# VIBESEC_DISABLED       category: security
# VIBESEC_DISABLED       cwe: CWE-942
# VIBESEC_DISABLED       owasp: A01:2021 Broken Access Control
# VIBESEC_DISABLED       confidence: MEDIUM
  - id: vibesec.cors-allow-credentials-with-wildcard
    message: 'Returning Access-Control-Allow-Credentials: true alongside a wildcard origin is explicitly forbidden by the CORS spec and most browsers will reject the response. Pick a concrete origin or
      remove credentials.

      '
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: 'cors({ origin: "*", credentials: true })

              '
          - pattern: 'cors({ origin: true, credentials: true })

              '
    metadata:
      category: security
      cwe: CWE-942
      owasp: A01:2021 Broken Access Control
      confidence: HIGH
  - id: vibesec.cors-reflect-origin
    message: 'Reflecting the request Origin header back as Access-Control-Allow-Origin effectively allows any site to act with the user''s credentials. Compare the Origin against a static allowlist before
      echoing it.

      '
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: '$RES.setHeader("Access-Control-Allow-Origin", $REQ.headers.origin)

          '
    metadata:
      category: security
      cwe: CWE-942
      owasp: A01:2021 Broken Access Control
      confidence: MEDIUM
  - id: vibesec.open-redirect-flask
    message: 'Redirecting to a URL taken directly from the request enables phishing via your domain. Validate the target against a whitelist of paths or hostnames before calling redirect().

      '
    severity: WARNING
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: 'flask.redirect(request.args.get(...))

              '
          - pattern: 'redirect(request.args.get(...))

              '
          - pattern: 'redirect(request.values.get(...))

              '
          - pattern: 'redirect(request.form.get(...))

              '
    metadata:
      category: security
      cwe: CWE-601
      owasp: A01:2021 Broken Access Control
      confidence: MEDIUM
  - id: vibesec.open-redirect-express
    message: 'Passing request input directly to res.redirect() lets attackers craft links that bounce victims through your domain to a phishing page. Use an allowlist or restrict to known internal paths.

      '
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: '$RES.redirect($REQ.query.$_)

              '
          - pattern: '$RES.redirect($REQ.body.$_)

              '
          - pattern: '$RES.redirect($REQ.params.$_)

              '
    metadata:
      category: security
      cwe: CWE-601
      owasp: A01:2021 Broken Access Control
      confidence: MEDIUM
  - id: vibesec.path-traversal-open-python
    message: 'Opening a file with a path built from request input lets an attacker escape the intended directory using "../" sequences. Resolve the final absolute path and verify it starts with a fixed
      base directory.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: 'open(request.args.get(...), ...)

              '
          - pattern: 'open(request.values.get(...), ...)

              '
          - pattern: 'open(request.form.get(...), ...)

              '
          - pattern: 'open(flask.request.args.get(...), ...)

              '
    metadata:
      category: security
      cwe: CWE-22
      owasp: A01:2021 Broken Access Control
      confidence: HIGH
  - id: vibesec.path-traversal-readfile-node
    message: 'fs.readFile / fs.readFileSync with an unsanitised user-supplied path allows reading any file the server process can access. Normalise the path and confirm it stays inside an allowlisted base
      directory.

      '
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: 'fs.readFile($REQ.query.$_, ...)

              '
          - pattern: 'fs.readFileSync($REQ.query.$_, ...)

              '
          - pattern: 'fs.readFile($REQ.body.$_, ...)

              '
          - pattern: 'fs.readFileSync($REQ.body.$_, ...)

              '
          - pattern: 'fs.readFile($REQ.params.$_, ...)

              '
          - pattern: 'fs.readFileSync($REQ.params.$_, ...)

              '
    metadata:
      category: security
      cwe: CWE-22
      owasp: A01:2021 Broken Access Control
      confidence: HIGH
  - id: vibesec.path-traversal-send-file-flask
    message: 'send_file() with a user-controlled filename leaks arbitrary files on the server. Use send_from_directory() with a fixed base directory, or validate the filename against a whitelist.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: 'send_file(request.args.get(...), ...)

              '
          - pattern: 'flask.send_file(request.args.get(...), ...)

              '
          - pattern: 'send_file(request.values.get(...), ...)

              '
    metadata:
      category: security
      cwe: CWE-22
      owasp: A01:2021 Broken Access Control
      confidence: HIGH
  - id: vibesec.csrf-disabled-flask-wtf
    message: 'Disabling Flask-WTF CSRF protection globally exposes every form-based POST endpoint to cross-site request forgery. Keep CSRF enabled and exempt only specific endpoints that require it, with
      a documented reason.

      '
    severity: ERROR
    languages:
      - python
    pattern: '$APP.config["WTF_CSRF_ENABLED"] = False

      '
    metadata:
      category: security
      cwe: CWE-352
      owasp: A01:2021 Broken Access Control
      confidence: HIGH
  - id: vibesec.csrf-exempt-decorator
    message: '@csrf_exempt removes CSRF protection from a Django view. Make sure this endpoint is either anonymous, idempotent, or uses an alternative authentication mechanism (e.g. token-based auth headers).

      '
    severity: WARNING
    languages:
      - python
    pattern: "@csrf_exempt\ndef $V(...):\n    ...\n"
    metadata:
      category: security
      cwe: CWE-352
      owasp: A01:2021 Broken Access Control
      confidence: LOW
  - id: vibesec.idor-direct-id-lookup-flask
    message: 'Looking up a record purely by an ID taken from the URL with no owner check enables Insecure Direct Object Reference attacks — another user can substitute their ID for yours. Verify the current
      user owns or has access to the object before returning it.

      '
    severity: INFO
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: '$MODEL.query.get(request.args.get(...))

              '
          - pattern: '$MODEL.query.get_or_404(request.args.get(...))

              '
          - pattern: '$MODEL.objects.get(id=request.GET[...])

              '
    metadata:
      category: security
      cwe: CWE-639
      owasp: A01:2021 Broken Access Control
      confidence: LOW
  - id: vibesec.weak-hash-md5-python
    message: 'MD5 is broken for any security purpose (collision resistance and preimage resistance are both undermined). For password hashing use bcrypt, scrypt, or argon2; for general-purpose hashing use
      SHA-256 or SHA-3.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: hashlib.md5(...)
          - pattern: hashlib.new("md5", ...)
          - pattern: Crypto.Hash.MD5.new(...)
    metadata:
      category: security
      cwe: CWE-328
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.weak-hash-sha1-python
    message: 'SHA-1 has practical collision attacks and is deprecated for signature and certificate use. Migrate to SHA-256 or SHA-3 for new code, and to a password-specific KDF (bcrypt / argon2 / scrypt)
      for password hashing.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: hashlib.sha1(...)
          - pattern: hashlib.new("sha1", ...)
          - pattern: Crypto.Hash.SHA1.new(...)
    metadata:
      category: security
      cwe: CWE-328
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.weak-hash-md4-python
    message: 'MD4 is severely broken and has been for two decades. There is no legitimate use of MD4 in new code. Replace with SHA-256 or, for passwords, a password-specific KDF.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: hashlib.new("md4", ...)
          - pattern: hashlib.new("md4")
    metadata:
      category: security
      cwe: CWE-328
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.weak-hash-md5-node
    message: 'crypto.createHash("md5") is unsuitable for any security context. Use crypto.createHash("sha256") for hashing or bcrypt/argon2 for passwords.

      '
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern: 'crypto.createHash("md5")

      '
    metadata:
      category: security
      cwe: CWE-328
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.weak-hash-sha1-node
    message: 'crypto.createHash("sha1") is no longer collision-resistant. For signatures and integrity, switch to sha256; for passwords, use bcrypt or argon2.

      '
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern: 'crypto.createHash("sha1")

      '
    metadata:
      category: security
      cwe: CWE-328
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.password-hashed-with-fast-hash
    message: 'Plain SHA-256, SHA-512, or MD5 are far too fast to use for password hashing — modern GPUs try billions per second. Use bcrypt, scrypt, argon2id, or PBKDF2 with a high iteration count so each
      guess is computationally expensive.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: hashlib.sha256($PWD).hexdigest()
          - pattern: hashlib.sha512($PWD).hexdigest()
          - pattern: hashlib.md5($PWD).hexdigest()
    metadata:
      category: security
      cwe: CWE-916
      owasp: A02:2021 Cryptographic Failures
      confidence: MEDIUM
  - id: vibesec.weak-cipher-des-pycryptodome
    message: 'DES uses a 56-bit key and is brute-forceable on commodity hardware in hours. Use AES-GCM (preferred) or AES-CBC with HMAC for new code.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: Crypto.Cipher.DES.new(...)
          - pattern: Cryptodome.Cipher.DES.new(...)
    metadata:
      category: security
      cwe: CWE-327
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.weak-cipher-3des
    message: 'Triple-DES is deprecated by NIST (SP 800-131A) and offers an effective strength of only 112 bits with known birthday attacks on 64-bit block ciphers. Migrate to AES.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: Crypto.Cipher.DES3.new(...)
          - pattern: Cryptodome.Cipher.DES3.new(...)
          - pattern: cryptography.hazmat.primitives.ciphers.algorithms.TripleDES(...)
    metadata:
      category: security
      cwe: CWE-327
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.weak-cipher-rc4
    message: 'RC4 has multiple well-known biases in its output stream and is forbidden by TLS 1.2+ (RFC 7465). Use a modern stream cipher mode such as AES-GCM or ChaCha20-Poly1305.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: Crypto.Cipher.ARC4.new(...)
          - pattern: Cryptodome.Cipher.ARC4.new(...)
    metadata:
      category: security
      cwe: CWE-327
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.weak-cipher-blowfish
    message: 'Blowfish has a 64-bit block size, which makes it vulnerable to birthday attacks (Sweet32) after about 2^32 blocks. Modern code should use AES (128-bit block) or ChaCha20.

      '
    severity: WARNING
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: Crypto.Cipher.Blowfish.new(...)
          - pattern: Cryptodome.Cipher.Blowfish.new(...)
    metadata:
      category: security
      cwe: CWE-327
      owasp: A02:2021 Cryptographic Failures
      confidence: MEDIUM
  - id: vibesec.aes-ecb-mode
    message: 'ECB mode encrypts identical plaintext blocks to identical ciphertext blocks, leaking patterns in the data (the famous Tux penguin example). Use an authenticated mode such as AES-GCM, or AES-CBC
      paired with a separate HMAC.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: Crypto.Cipher.AES.new($KEY, AES.MODE_ECB)
          - pattern: Cryptodome.Cipher.AES.new($KEY, AES.MODE_ECB)
          - pattern: AES.new($KEY, AES.MODE_ECB)
          - pattern: 'Cipher($ALGO, modes.ECB())

              '
    metadata:
      category: security
      cwe: CWE-327
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.aes-static-iv
    message: 'Reusing a static IV with CBC, CFB, or GCM mode breaks confidentiality and, for GCM, also breaks integrity. Generate a fresh random IV per message using a CSPRNG and prepend it to the ciphertext.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern: 'AES.new($KEY, AES.MODE_CBC, b"...")

          '
    metadata:
      category: security
      cwe: CWE-329
      owasp: A02:2021 Cryptographic Failures
      confidence: MEDIUM
  - id: vibesec.weak-rsa-key-size
    message: 'RSA keys below 2048 bits are no longer considered secure (NIST SP 800-131A). Generate keys at 2048 bits minimum; 3072 or 4096 for new long-lived keys.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: RSA.generate(512, ...)
          - pattern: RSA.generate(1024, ...)
          - pattern: Crypto.PublicKey.RSA.generate(512, ...)
          - pattern: Crypto.PublicKey.RSA.generate(1024, ...)
          - pattern: rsa.generate_private_key(public_exponent=$E, key_size=512, ...)
          - pattern: rsa.generate_private_key(public_exponent=$E, key_size=1024, ...)
    metadata:
      category: security
      cwe: CWE-326
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.insecure-random-python
    message: 'Python''s random module is a deterministic PRNG seeded from low-entropy sources and is not safe for tokens, session IDs, salts, or any value an attacker should not be able to predict. Use
      secrets.token_bytes(), secrets.token_urlsafe(), or os.urandom() instead.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: random.random()
          - pattern: random.randint(...)
          - pattern: random.choice(...)
          - pattern: random.choices(...)
          - pattern: random.sample(...)
    metadata:
      category: security
      cwe: CWE-338
      owasp: A02:2021 Cryptographic Failures
      confidence: MEDIUM
  - id: vibesec.insecure-random-math-js
    message: 'Math.random() is implementation-defined and predictable. For any security-relevant value (tokens, IDs, salts) use crypto.randomBytes(), crypto.randomUUID(), or crypto.getRandomValues() in
      the browser.

      '
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern: Math.random()
    metadata:
      category: security
      cwe: CWE-338
      owasp: A02:2021 Cryptographic Failures
      confidence: MEDIUM
  - id: vibesec.insecure-uuid-v1
    message: 'UUID v1 is timestamp + MAC-address-based and exposes the host''s hardware address as well as the time of generation. For tokens or identifiers exposed to untrusted parties, use UUID v4 from
      a CSPRNG.

      '
    severity: WARNING
    languages:
      - python
    patterns:
      - pattern: uuid.uuid1(...)
    metadata:
      category: security
      cwe: CWE-330
      owasp: A02:2021 Cryptographic Failures
      confidence: MEDIUM
  - id: vibesec.hardcoded-password-assignment-python
    message: 'Hardcoded passwords end up in version control, CI logs, and crash reports. Read secrets from environment variables, a secret manager, or a config file that is excluded from the repository.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: 'password = "..."

              '
          - pattern: 'PASSWORD = "..."

              '
          - pattern: 'passwd = "..."

              '
          - pattern: 'pwd = "..."

              '
    metadata:
      category: security
      cwe: CWE-798
      owasp: A02:2021 Cryptographic Failures
      confidence: LOW
  - id: vibesec.hardcoded-password-assignment-js
    message: 'Hardcoded passwords end up in version control, CI logs, and crash reports. Read secrets from environment variables, a secret manager, or a config file that is excluded from the repository.

      '
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: 'const password = "..."

              '
          - pattern: 'let password = "..."

              '
          - pattern: 'var password = "..."

              '
          - pattern: 'const PASSWORD = "..."

              '
    metadata:
      category: security
      cwe: CWE-798
      owasp: A02:2021 Cryptographic Failures
      confidence: LOW
  - id: vibesec.hardcoded-api-key-pattern
    message: 'What looks like a long high-entropy string assigned to an API key variable is almost certainly a real secret. Move it to an environment variable or secret manager and rotate the leaked value.

      '
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern-regex: (?i)(api[_-]?key|apikey|access[_-]?token|secret[_-]?key)\s*[:=]\s*["'][A-Za-z0-9_\-]{24,}["']
    metadata:
      category: security
      cwe: CWE-798
      owasp: A02:2021 Cryptographic Failures
      confidence: MEDIUM
  - id: vibesec.hardcoded-aws-access-key
    message: 'An AWS access key ID embedded in source code is a credentials leak. Revoke the key immediately, then move IAM credentials to environment variables, AWS profiles, or instance roles.

      '
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
    pattern-regex: AKIA[0-9A-Z]{16}
    metadata:
      category: security
      cwe: CWE-798
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.hardcoded-private-key-block
    message: 'A PEM private key checked into source code is an immediate compromise. Revoke and rotate the key, then store the replacement in a secret manager. Add a pre-commit hook to block private key
      blocks from future commits.

      '
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
    pattern-regex: '-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'
    metadata:
      category: security
      cwe: CWE-798
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.hardcoded-jwt-secret
    message: 'The signing secret for a JWT verifier should never appear in source. Anyone with the secret can mint valid tokens for any user. Load it from env vars or a secret store.

      '
    severity: ERROR
    languages:
      - javascript
      - typescript
      - python
    patterns:
      - pattern-either:
          - pattern: 'jwt.sign($PAYLOAD, "...", ...)

              '
          - pattern: 'jwt.verify($TOK, "...", ...)

              '
          - pattern: 'jwt.encode($PAYLOAD, "...", ...)

              '
          - pattern: 'jwt.decode($TOK, "...", ...)

              '
    metadata:
      category: security
      cwe: CWE-798
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.tls-verify-disabled-requests
    message: 'requests.get(..., verify=False) silently accepts any certificate, opening every call to machine-in-the-middle interception. If you need a private CA, pass the bundle path via verify=; never
      disable verification.

      '
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: requests.get(..., verify=False, ...)
          - pattern: requests.post(..., verify=False, ...)
          - pattern: requests.put(..., verify=False, ...)
          - pattern: requests.delete(..., verify=False, ...)
          - pattern: requests.patch(..., verify=False, ...)
          - pattern: requests.head(..., verify=False, ...)
          - pattern: requests.request(..., verify=False, ...)
          - pattern: requests.Session().get(..., verify=False, ...)
    metadata:
      category: security
      cwe: CWE-295
      owasp: A02:2021 Cryptographic Failures
      confidence: HIGH
  - id: vibesec.tls-verify-disabled-urllib3
    message: 'Disabling urllib3 InsecureRequestWarning hides the symptom but doesn''t fix the problem — verification is still off somewhere in your stack. Re-enable certificate verification rather than
      silencing the warning.

      '
    severity: WARNING
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: urllib3.disable_warnings(...)
          - pattern: urllib3.disable_warnings()
    metadata:
      category: security
      cwe: CWE-295
      owasp: A02:2021 Cryptographic Failures
      confidence: MEDIUM
  - id: vibesec.tls-verify-disabled-node
    message: 'Setting rejectUnauthorized: false on a TLS connection disables certificate verification, allowing any attacker on the path to impersonate the remote host. Provide a custom ca bundle if you
      need to trust an internal CA.

      '
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: '{ rejectUnauthorized: false }

              '
          - pattern: 'https.request({..., rejectUnauthorized: false, ...}, ...)

